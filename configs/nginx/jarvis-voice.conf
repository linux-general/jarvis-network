# /etc/nginx/sites-available/jarvis-voice
#
# Twilio voice routing for voice.jarvisnetwork.org.
# Each persona (v3, v4, v5, steno) has a named upstream so we can add
# backup nodes by editing one line instead of every location block.
#
# Failover policy:
#   - primary       = ws-47 (100.64.0.9), serves all live numbers
#   - backup        = bm-42 (100.64.0.26), marked `down` until task #9 lands
#                     the orchestrator there
#   - fallback      = static TwiML served by nginx itself for /twilio/*/voice
#                     (the HTTP webhook). Media Stream websockets cannot be
#                     gracefully faked, so they just drop on total outage.
#
# To enable bm-42 failover after #9 brings it online:
#   1. ssh root@100.64.0.3
#   2. Remove the word `down` from each backup line in this file.
#   3. nginx -t && systemctl reload nginx
#
# `max_fails=3 fail_timeout=30s` on the primary means after 3 connection
# errors within a 30s window, nginx marks the upstream temporarily unhealthy
# and routes to the backup for the next 30 seconds before re-trying primary.

# ── Upstreams ────────────────────────────────────────────────────────────────

upstream voice_v1_legacy {
    server 100.64.0.26:18792 max_fails=3 fail_timeout=30s;
    # No backup for legacy v1 (bm-42 IS the primary here)
}

upstream orchestrator_v3 {
    server 100.64.0.9:8444 max_fails=3 fail_timeout=30s;
    server 100.64.0.26:8444 backup down;
}

upstream orchestrator_v4 {
    server 100.64.0.9:8445 max_fails=3 fail_timeout=30s;
    server 100.64.0.26:8445 backup down;
}

upstream orchestrator_v5 {
    server 100.64.0.9:8446 max_fails=3 fail_timeout=30s;
    server 100.64.0.26:8446 backup down;
}

upstream orchestrator_steno {
    server 100.64.0.9:8447 max_fails=3 fail_timeout=30s;
    server 100.64.0.26:8447 backup down;
}

upstream zoho_cliq {
    server 100.64.0.9:8470 max_fails=3 fail_timeout=30s;
    server 100.64.0.26:8470 backup down;
}

upstream vx_test {
    server 100.64.0.15:8446 max_fails=3 fail_timeout=30s;
    # vx-test is itself a test edge node, no backup
}

# ── Server ───────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name voice.jarvisnetwork.org;

    ssl_certificate /etc/letsencrypt/live/voice.jarvisnetwork.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voice.jarvisnetwork.org/privkey.pem;

    # Standard headers reused by most upstreams
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Static-TwiML fallback used when an HTTP-webhook upstream returns 5xx
    # (this is what Twilio plays to the caller when the brain is unreachable).
    location = /__fallback/voice {
        internal;
        default_type application/xml;
        return 200 '<?xml version="1.0" encoding="UTF-8"?><Response><Say voice="Polly.Joanna-Neural">Sorry, the assistant is briefly unavailable. Please call back in a moment.</Say><Pause length="1"/><Hangup/></Response>';
    }

    # ── Legacy v1 (bm-42) ────────────────────────────────────────────────────
    location /voice/webhook {
        proxy_pass http://voice_v1_legacy/voice/webhook;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = /__fallback/voice;
    }

    location /voice/stream {
        proxy_pass http://voice_v1_legacy/voice/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── v3 (ws-47:8444) ──────────────────────────────────────────────────────
    location /twilio/voice {
        proxy_pass http://orchestrator_v3/twilio/voice;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = /__fallback/voice;
    }

    location /twilio/stream {
        proxy_pass http://orchestrator_v3/twilio/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_next_upstream error timeout;
    }

    location /twilio/tts/ {
        proxy_pass http://orchestrator_v3/twilio/tts/;
        proxy_read_timeout 60s;
    }

    # ── v4 (ws-47:8445) ──────────────────────────────────────────────────────
    location /twilio/v4/voice {
        proxy_pass http://orchestrator_v4/twilio/v4/voice;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = /__fallback/voice;
    }

    location /twilio/v4/stream {
        proxy_pass http://orchestrator_v4/twilio/v4/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_next_upstream error timeout;
    }

    location /twilio/v4/health {
        proxy_pass http://orchestrator_v4/twilio/v4/health;
    }

    location /twilio/v4/sms {
        proxy_pass http://orchestrator_v4/twilio/v4/sms;
        proxy_read_timeout 60s;
    }

    # ── v5 (ws-47:8446) ──────────────────────────────────────────────────────
    location /twilio/v5/voice {
        proxy_pass http://orchestrator_v5/twilio/v5/voice;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = /__fallback/voice;
    }

    location /twilio/v5/stream {
        proxy_pass http://orchestrator_v5/twilio/v5/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_next_upstream error timeout;
    }

    location /twilio/v5/health {
        proxy_pass http://orchestrator_v5/twilio/v5/health;
    }

    location /twilio/v5/sms {
        proxy_pass http://orchestrator_v5/twilio/v5/sms;
        proxy_read_timeout 60s;
    }

    # ── steno (ws-47:8447) ───────────────────────────────────────────────────
    location /twilio/steno/voice {
        proxy_pass http://orchestrator_steno/twilio/steno/voice;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = /__fallback/voice;
    }

    location /twilio/steno/stream {
        proxy_pass http://orchestrator_steno/twilio/steno/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_next_upstream error timeout;
    }

    location /twilio/steno/health {
        proxy_pass http://orchestrator_steno/twilio/steno/health;
    }

    # ── vx-test edge node (100.64.0.15:8446) ─────────────────────────────────
    location /vx-test/twilio/v5/stream {
        rewrite ^/vx-test(/.*) $1 break;
        proxy_pass http://vx_test;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /vx-test/twilio/ {
        rewrite ^/vx-test(/.*) $1 break;
        proxy_pass http://vx_test;
        proxy_read_timeout 300s;
    }

    # ── Zoho Cliq bot (ws-47:8470) ───────────────────────────────────────────
    location /cliq/ {
        proxy_pass http://zoho_cliq;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}

server {
    listen 80;
    server_name voice.jarvisnetwork.org;
    return 301 https://$host$request_uri;
}
