# Jarvis Network model library manifest
#
# Declarative catalog of every model mirrored to the jarvis-models bucket on
# Vultr Object Storage (ATL). Containers read this manifest at boot to decide
# what to pull and verify against sha256.
#
# Bucket layout (single bucket, prefixed):
#   s3://jarvis-models/llm/<id>/<files>
#   s3://jarvis-models/stt/<id>/<files>
#   s3://jarvis-models/tts/<id>/<files>
#   s3://jarvis-models/diarization/<id>/<files>
#
# Each entry mirrors a HuggingFace repo verbatim — files, README, config, all
# of it — so a container can hf_hub_download() against the bucket if we expose
# it via a small HF-compatible proxy, OR boto3 cp them directly.
#
# Fields:
#   id          — short slug used in container env (e.g. HF_MODEL=qwen3-32b-awq)
#   hf_repo     — upstream HuggingFace repo (the source of truth)
#   prefix      — S3 prefix under the bucket (llm/, stt/, tts/, diarization/)
#   role        — one of: llm-primary, llm-coder, llm-small, stt, tts, diarization
#   size_gb     — approximate on-disk footprint, for capacity planning
#   runs_on     — minimum hardware to actually serve this (informational)
#   status      — current | aspirational | archived
#   notes       — short rationale, one line

manifest_version: 1
updated: 2026-06-29
bucket: jarvis-models
region: atl

